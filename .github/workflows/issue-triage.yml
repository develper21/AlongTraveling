name: Issue Triage

on:
  issues:
    types: [opened, reopened]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'

    steps:
    - name: Auto-label issues
      uses: actions/github-script@v7
      with:
        script: |
          const issue = context.payload.issue;
          const labels = [];
          
          // Auto-label based on issue content
          if (issue.title.includes('bug') || issue.title.includes('fix') || issue.body.includes('error')) {
            labels.push('bug');
          }
          
          if (issue.title.includes('feature') || issue.title.includes('enhancement') || issue.body.includes('would like')) {
            labels.push('enhancement');
          }
          
          if (issue.title.includes('documentation') || issue.body.includes('docs') || issue.body.includes('readme')) {
            labels.push('documentation');
          }
          
          if (issue.title.includes('security') || issue.body.includes('vulnerability') || issue.body.includes('security')) {
            labels.push('security');
          }
          
          if (issue.title.includes('question') || issue.title.includes('help') || issue.body.includes('how to')) {
            labels.push('question');
          }
          
          // Add labels if any were determined
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labels
            });
          }

  add-to-project:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'

    steps:
    - name: Add to project board
      uses: actions/github-script@v7
      with:
        script: |
          // Add issue to project board (requires project setup)
          // This is a placeholder - you'll need to set up your project board
          console.log('Adding issue to project board...');

  welcome-new-contributors:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'

    steps:
    - name: Welcome first-time contributors
      uses: actions/github-script@v7
      with:
        script: |
          const issue = context.payload.issue;
          const user = issue.user;
          
          // Check if this is the user's first issue
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            creator: user.login,
            state: 'all'
          });
          
          if (issues.data.length === 1) {
            // This is their first issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `👋 Welcome @${user.login}! Thank you for opening your first issue in HopAlong! 🎉

              Our maintainers will review this issue shortly. In the meantime, please make sure:
              - ✅ You've provided enough detail for us to understand the problem
              - ✅ You've included steps to reproduce (if it's a bug)
              - ✅ You've checked existing issues to avoid duplicates

              Want to contribute? Check out our [Contributing Guide](CONTRIBUTING.md) for ways to get started! 🚀`
            });
          }
