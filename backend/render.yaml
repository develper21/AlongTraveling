services:
  # Web Service
  - type: web
    name: alongtraveling-backend
    runtime: node
    plan: free
    env: node
    region: oregon
    buildCommand: "npm install --production"
    startCommand: "npm start"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: FRONTEND_URL
        value: https://alontraveling.netlify.app
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
    
    # Auto-deploy configuration
    autoDeploy: yes
    numInstances: 1
    
    # Health check configuration
    healthCheck:
      path: /health
      checkInterval: 10
      timeout: 5
      gracePeriod: 30
      restartPolicy:
        type: on_failure
        restartLimit: 3
